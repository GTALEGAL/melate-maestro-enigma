<script>
    const loaderGif = "<img src='https://i.gifer.com/ZZ5H.gif' width='25' style='vertical-align:middle'> Procesando Capa...";

    async function iniciarSistemaMaestro() {
        // Estación 1: Datos Base y Capa 1
        document.getElementById('c1-frec').innerHTML = loaderGif;
        const r1 = await fetch('/api/capa1');
        const d1 = await r1.json();
        
        document.getElementById('id-concurso').innerText = d1.concurso;
        render('ultimo-sorteo', d1.numeros_ultimo, 'active');
        render('c1-frec', d1.capa1);

        // PAUSA TÉCNICA DE 3 SEGUNDOS
        await new Promise(r => setTimeout(r, 3000));

        // Estación 2: Capa 5
        document.getElementById('c5-pares').innerHTML = loaderGif;
        const r2 = await fetch('/api/capa5');
        const d2 = await r2.json();
        render('c5-pares', d2.capa5);

        // PAUSA TÉCNICA DE 3 SEGUNDOS
        await new Promise(r => setTimeout(r, 3000));

        // Estación 3: Capa 10 (Resultado Maestro)
        document.getElementById('c10-score').innerHTML = loaderGif;
        const r3 = await fetch('/api/capa10');
        const d3 = await r3.json();
        render('c10-score', d3.capa10, 'final');
    }

    window.onload = iniciarSistemaMaestro;

    function render(id, nums, cls='') {
        const container = document.getElementById(id);
        container.innerHTML = nums.map(n => `<div class="ball ${cls}">${n}</div>`).join('');
    }
</script>
