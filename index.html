<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONDOMINIO B - DASHBOARD</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --gold: #ffcc00;
            --bg-dark: #050505;
        }

        body {
            background-color: #000;
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 700px;
            border: 2px solid var(--neon-green);
            padding: 25px;
            background: var(--bg-dark);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }

        h1 { text-align: center; font-size: 1.4rem; border-bottom: 1px solid var(--neon-green); padding-bottom: 10px; }

        .panel { margin-top: 20px; border: 1px dashed rgba(0, 255, 65, 0.4); padding: 15px; }
        .panel-header { font-weight: bold; margin-bottom: 15px; color: #fff; text-transform: uppercase; }

        .ball-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 15px 0; }
        .ball {
            width: 45px; height: 45px; border: 2px solid var(--neon-green);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.1rem;
        }
        .ball.new { background: var(--neon-green); color: #000; box-shadow: 0 0 10px var(--neon-green); }

        .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .metric-box { background: rgba(255,255,255,0.05); padding: 10px; text-align: center; }
        .metric-label { font-size: 0.7rem; display: block; opacity: 0.8; }
        .metric-value { font-size: 1.2rem; font-weight: bold; color: #fff; }

        .alert-zone {
            margin-top: 20px; padding: 15px; text-align: center; font-weight: bold;
            border: 2px solid #222; color: #222; transition: 0.5s;
        }
        .alert-zone.active {
            border-color: var(--gold); color: var(--gold);
            text-shadow: 0 0 5px var(--gold);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .status-bar { font-size: 0.8rem; margin-top: 15px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛰️ SISTEMA PREDICTIVO CONDOMINIO B</h1>

    <div class="panel">
        <div class="panel-header">📡 Último Sorteo (Concurso <span id="id_concurso">...</span>)</div>
        <div id="row_ultimo" class="ball-row"></div>
        <div class="status-bar">REGISTRO: <span id="fecha_ultimo">...</span></div>
    </div>

    <div class="panel" style="border-color: var(--gold);">
        <div class="panel-header" style="color: var(--gold);">🎯 Vector de Resonancia Sugerido</div>
        <div id="row_prediccion" class="ball-row"></div>
        
        <div class="metrics">
            <div class="metric-box"><span class="metric-label">PARIDAD</span><span id="m_par" class="metric-value">--</span></div>
            <div class="metric-box"><span class="metric-label">MEDIA</span><span id="m_prom" class="metric-value">--</span></div>
            <div class="metric-box"><span class="metric-label">SUMA TOTAL</span><span id="m_suma" class="metric-value">--</span></div>
        </div>

        <div id="alerta_dorada" class="alert-zone">ALERTA DORADA STANDBY</div>
    </div>

    <div class="status-bar" style="text-align: center; margin-top: 20px;">
        ESTADO: <span style="color:var(--neon-green)">OPERATIVO // SINCRONIZADO</span>
    </div>
</div>

<script>
    async function syncSystem() {
        try {
            const res = await fetch('/api/index');
            const data = await res.json();

            if(data.error) throw new Error(data.error);

            // Cargar datos del último sorteo
            document.getElementById('id_concurso').innerText = data.concurso;
            document.getElementById('fecha_ultimo').innerText = data.fecha;
            renderBalls('row_ultimo', data.ultimo_sorteo, false);

            // Cargar predicción
            renderBalls('row_prediccion', data.prediccion, true);

            // Cargar métricas
            document.getElementById('m_par').innerText = data.metricas.paridad;
            document.getElementById('m_prom').innerText = data.metricas.promedio;
            const suma = data.metricas.suma;
            document.getElementById('m_suma').innerText = suma;

            // Lógica Alerta Dorada
            if(suma >= 130 && suma <= 210) {
                const alerta = document.getElementById('alerta_dorada');
                alerta.innerText = "⚠️ ALERTA DORADA: RESONANCIA ÓPTIMA";
                alerta.classList.add('active');
            }

        } catch (err) {
            console.error("Error de enlace:", err);
            document.body.innerHTML = `<div style="color:red; text-align:center; padding:50px;">
                FALLO DE TELEMETRÍA: ${err.message}<br>Revisa que index.py y datos.csv estén correctos.
            </div>`;
        }
    }

    function renderBalls(id, nums, isHot) {
        const container = document.getElementById(id);
        container.innerHTML = nums.map(n => `
            <div class="ball ${isHot ? 'new' : ''}">${n}</div>
        `).join('');
    }

    window.onload = syncSystem;
</script>

</body>
</html>
