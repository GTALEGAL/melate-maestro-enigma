<div id="dashboard">
    <div class="card">
        <h3>🛰️ ÚLTIMO SORTEO DETECTADO (CONCURSO <span id="id-concurso">...</span>)</h3>
        <div id="numeros-ultimo" class="ball-container"></div>
        <p>Fecha de registro: <span id="fecha-ultimo">...</span></p>
    </div>

    <div class="card highlight">
        <h3>🎯 VECTOR PREDICTIVO SUGERIDO</h3>
        <div id="vector-prediccion" class="ball-container large"></div>
        <div class="grid-metrics">
            <div class="metric"><span>PARIDAD:</span> <b id="m-par">...</b></div>
            <div class="metric"><span>MEDIA:</span> <b id="m-prom">...</b></div>
            <div class="metric"><span>SUMA:</span> <b id="m-suma">...</b></div>
            <div id="alerta" class="metric-alert">ALERTA DORADA</div>
        </div>
    </div>
</div>

<script>
    // Al cargar la página, ejecuta el análisis automático
    window.onload = async () => {
        const response = await fetch('/api/index');
        const data = await response.json();
        
        // Actualizar UI
        document.getElementById('id-concurso').innerText = data.ultimo_sorteo.concurso;
        document.getElementById('fecha-ultimo').innerText = data.ultimo_sorteo.fecha;
        
        // Renderizar bolas del último sorteo
        renderBalls('numeros-ultimo', data.ultimo_sorteo.numeros);
        
        // Renderizar predicción
        renderBalls('vector-prediccion', data.prediccion, true);
        
        // Métricas
        document.getElementById('m-par').innerText = data.metricas.paridad;
        document.getElementById('m-prom').innerText = data.metricas.promedio;
        document.getElementById('m-suma').innerText = data.metricas.suma_total;
        
        if(data.metricas.alerta_dorada === "ACTIVA") {
            document.getElementById('alerta').classList.add('gold-on');
        }
    };

    function renderBalls(id, nums, highlight=false) {
        const container = document.getElementById(id);
        container.innerHTML = nums.map(n => `<div class="ball ${highlight ? 'hot' : ''}">${n}</div>`).join('');
    }
</script>
