<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA MAESTRO - DIAGNÓSTICO</title>
    <style>
        body { background: #0b0f19; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        .ball { display: inline-flex; width: 30px; height: 30px; background: #d4af37; color: black; border-radius: 50%; align-items: center; justify-content: center; margin: 3px; font-weight: bold; }
        .debug-msg { color: #58a6ff; font-size: 0.8rem; font-family: monospace; background: #000; padding: 5px; display: block; margin-top: 5px; }
        .error { color: #ff7b72; }
    </style>
</head>
<body>

    <h1>🛰️ MELATE MAESTRO: ESTADO DE CONEXIÓN</h1>

    <div class="card">
        <h2>ESTACIÓN 1 (DATOS BASE)</h2>
        <div id="res-1">Esperando...</div>
        <div id="debug-1" class="debug-msg">Estado: Iniciando...</div>
    </div>

    <div class="card">
        <h2>ESTACIÓN 2 (PARES)</h2>
        <div id="res-2">---</div>
        <div id="debug-2" class="debug-msg">Estado: Pendiente...</div>
    </div>

    <div class="card">
        <h2>ESTACIÓN 3 (SCORE FINAL)</h2>
        <div id="res-3">---</div>
        <div id="debug-3" class="debug-msg">Estado: Pendiente...</div>
    </div>

    <script>
        async function testConexion() {
            // PRUEBA CAPA 1
            try {
                const r1 = await fetch('/api/capa1');
                const d1 = await r1.json();
                document.getElementById('debug-1').innerText = "RECIBIDO: " + JSON.stringify(d1);
                
                // Dibujar si existen los datos
                if(d1.capa1) {
                    document.getElementById('res-1').innerHTML = d1.capa1.map(n => `<div class="ball">${n}</div>`).join('');
                }
            } catch (e) {
                document.getElementById('debug-1').innerHTML = "<span class='error'>ERROR: No responde /api/capa1</span>";
            }

            await new Promise(r => setTimeout(r, 2000));

            // PRUEBA CAPA 5
            try {
                const r2 = await fetch('/api/capa5');
                const d2 = await r2.json();
                document.getElementById('debug-2').innerText = "RECIBIDO: " + JSON.stringify(d2);
                if(d2.capa5) {
                    document.getElementById('res-2').innerHTML = d2.capa5.map(n => `<div class="ball">${n}</div>`).join('');
                }
            } catch (e) {
                document.getElementById('debug-2').innerHTML = "<span class='error'>ERROR: No responde /api/capa5</span>";
            }

            await new Promise(r => setTimeout(r, 2000));

            // PRUEBA CAPA 10
            try {
                const r3 = await fetch('/api/capa10');
                const d3 = await r3.json();
                document.getElementById('debug-3').innerText = "RECIBIDO: " + JSON.stringify(d3);
                if(d3.capa10) {
                    document.getElementById('res-3').innerHTML = d3.capa10.map(n => `<div class="ball" style="background:#238636;color:white">${n}</div>`).join('');
                }
            } catch (e) {
                document.getElementById('debug-3').innerHTML = "<span class='error'>ERROR: No responde /api/capa10</span>";
            }
        }

        window.onload = testConexion;
    </script>
</body>
</html>
