<script>
    async function ejecutarAnalisis() {
        const loader = "<img src='https://i.gifer.com/ZZ5H.gif' width='30'> Analizando...";
        
        // PASO 1: Capa 1 (Frecuencia)
        document.getElementById('c1-frec').innerHTML = loader;
        const res1 = await fetch('/api/capa1');
        const data1 = await res1.json();
        render('c1-frec', data1.numeros);

        // PAUSA DE 3 SEGUNDOS PARA EL "RADAR"
        await new Promise(r => setTimeout(r, 3000));

        // PASO 2: Capa 5 (Pares)
        document.getElementById('c5-pares').innerHTML = loader;
        const res2 = await fetch('/api/capa5');
        const data2 = await res2.json();
        render('c5-pares', data2.numeros);

        // OTRA PAUSA
        await new Promise(r => setTimeout(r, 3000));

        // PASO 3: Capa 10 (Score Final)
        document.getElementById('c10-score').innerHTML = loader;
        const res3 = await fetch('/api/capa10');
        const data3 = await res3.json();
        render('c10-score', data3.numeros, 'final');
    }

    window.onload = ejecutarAnalisis;
</script>
