<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA ENIGMA - CONDOMINIO B</title>
    <style>
        :root {
            --nasa-blue: #0b3d91;
            --neon-green: #00ff41;
            --terminal-bg: rgba(0, 15, 0, 0.95);
        }

        body {
            background-color: #000;
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Efecto de Interferencia y Monitor CRT */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .terminal {
            width: 95%;
            max-width: 900px;
            height: 90vh;
            border: 2px solid var(--neon-green);
            padding: 25px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
            position: relative;
            background: var(--terminal-bg);
            display: flex;
            flex-direction: column;
            cursor: text;
        }

        .header {
            border-bottom: 1px solid var(--neon-green);
            padding-bottom: 5px;
            margin-bottom: 15px;
            font-size: 1.2em;
            display: flex;
            justify-content: space-between;
            text-shadow: 0 0 5px var(--neon-green);
        }

        #output {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            font-size: 1.1em;
            line-height: 1.5em;
        }

        .input-area {
            display: flex;
            align-items: center;
            border-top: 1px solid var(--neon-green);
            padding-top: 15px;
        }

        .prompt {
            color: #fff;
            margin-right: 10px;
            font-weight: bold;
        }

        input {
            background: transparent;
            border: none;
            color: var(--neon-green);
            font-family: inherit;
            font-size: 1.2em;
            outline: none;
            width: 100%;
            caret-color: var(--neon-green);
        }

        /* Bloque de Datos Estilo NASA */
        .nasa-stats {
            border-left: 4px solid var(--neon-green);
            background: rgba(0, 255, 65, 0.05);
            padding: 15px;
            margin: 15px 0;
            animation: glitch 0.3s ease;
        }

        .vector-result {
            font-size: 1.5em;
            color: #fff;
            letter-spacing: 5px;
            margin: 10px 0;
            display: block;
            text-align: center;
            text-shadow: 0 0 10px #fff;
        }

        @keyframes glitch {
            0% { transform: translate(2px, 0); }
            50% { transform: translate(-2px, 0); }
            100% { transform: translate(0); }
        }

        #output::-webkit-scrollbar { width: 4px; }
        #output::-webkit-scrollbar-thumb { background: var(--neon-green); }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <span>STATION: CONDOMINIO-B // MISSION: ENIGMA-2.0</span>
        <span id="clock">00:00:00</span>
    </div>
    
    <div id="output">
        <div>> INITIALIZING NASA PREDICTIVE ENGINE... [OK]</div>
        <div>> DATABASE: DATOS.CSV CONNECTED.</div>
        <div>> MULTIVARIATE ANALYSIS MODE: ACTIVE.</div>
        <div style="color: #888; margin-top: 10px;">[ INGRESE GATILLO NUMÉRICO PARA CÁLCULO DE TRAYECTORIA ]</div>
    </div>

    <form id="cmdForm" class="input-area">
        <span class="prompt">DIRECTOR_CMD></span>
        <input type="number" id="cmdInput" autofocus autocomplete="off">
    </form>
</div>

<script>
    const input = document.getElementById('cmdInput');
    const output = document.getElementById('output');
    const form = document.getElementById('cmdForm');
    const terminal = document.querySelector('.terminal');

    // Reloj en tiempo real
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // Foco automático agresivo
    terminal.addEventListener('click', () => input.focus());
    window.onload = () => input.focus();

    // ESCUCHA DE ÓRDENES MEDIANTE FORMULARIO (MÁS FIABLE QUE EL KEYPRESS)
    form.addEventListener('submit', function (e) {
        e.preventDefault(); // Evita que la página se refresque
        
        const val = input.value;
        if (val === '') return;

        printToConsole(`<span style="color: #666">> COMANDO RECIBIDO: EJECUTANDO CÁLCULO PARA GATILLO ${val}...</span>`);
        
        fetch(`/api?gatillo=${val}`)
            .then(r => {
                if (!r.ok) throw new Error("SERVIDOR NO RESPONDE (404/500)");
                return r.json();
            })
            .then(data => {
                if(data.error) throw new Error(data.error);

                const socios = data.socios_frecuentes ? data.socios_frecuentes.join(" - ") : "SIN DATOS";
                const paridad = data.metricas ? data.metricas.balance_par : "?";
                const promedio = data.metricas ? data.metricas.promedio : "?";
                
                printToConsole(`
                    <div class="nasa-stats">
                        [ REPORTE DE TRAYECTORIA PREDICTIVA ]<br>
                        ------------------------------------------------<br>
                        GATILLO ORIGEN: ${data.gatillo}<br>
                        VECTOR DE RESONANCIA (7):<br>
                        <span class="vector-result">${socios}</span><br>
                        [ MÉTRICAS DE VALIDACIÓN ]<br>
                        > BALANCE PARIDAD: ${paridad} / 7<br>
                        > MEDIA DEL VECTOR: ${promedio}<br>
                        > CONFIANZA: ${data.metricas ? data.metricas.confianza : "ESTÁNDAR"}<br>
                        ------------------------------------------------<br>
                        SISTEMA: ${data.mensaje}
                    </div>
                `);
            })
            .catch(err => {
                printToConsole(`<span style="color:red">> ERROR DE NÚCLEO: ${err.message}</span>`);
            });
        
        input.value = ''; // Limpia para la siguiente orden
    });

    function printToConsole(text) {
        const div = document.createElement('div');
        div.innerHTML = text;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }
</script>

</body>
</html>
