<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MELATE MAESTRO | Dashboard</title>
    <style>
        :root { --bg: #0b0f19; --card: #161b22; --gold: #d4af37; --green: #238636; }
        body { background: var(--bg); color: #c9d1d9; font-family: sans-serif; padding: 20px; }
        .wrapper { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .ball { display: inline-flex; width: 35px; height: 35px; background: #21262d; border-radius: 50%; align-items: center; justify-content: center; margin: 4px; font-weight: bold; color: var(--gold); }
        .active { background: var(--gold); color: #000; }
        .final { background: var(--green); color: #fff; }
        .loader-text { color: #58a6ff; font-style: italic; font-size: 0.9rem; }
        h2 { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; margin-top: 0; }
    </style>
</head>
<body>

    <div class="wrapper">
        <h1 style="color:var(--gold); text-align:center;">MELATE MAESTRO</h1>

        <div class="card">
            <h2>📡 CONCURSO <span id="id-concurso">---</span></h2>
            <div id="box-ultimo"><span class="loader-text">Cargando base de datos...</span></div>
        </div>

        <div class="card">
            <h2>📊 CAPA 1: FRECUENCIA</h2>
            <div id="box-c1"></div>
        </div>

        <div class="card">
            <h2>⚡ CAPA 5: SECUENCIA</h2>
            <div id="box-c5"></div>
        </div>

        <div class="card" style="border-color:var(--green)">
            <h2>🏆 CAPA 10: SCORE FINAL</h2>
            <div id="box-c10"></div>
        </div>
    </div>

    <script>
        // Función para dibujar las bolas
        function dibujar(id, nums, clase = '') {
            const container = document.getElementById(id);
            if (!nums || nums.length === 0) return;
            container.innerHTML = nums.map(n => `<div class="ball ${clase}">${n}</div>`).join('');
        }

        async function ejecutarSistema() {
            try {
                // ETAPA 1: CAPA 1
                const r1 = await fetch('/api/capa1');
                const d1 = await r1.json();
                document.getElementById('id-concurso').innerText = d1.concurso;
                dibujar('box-ultimo', d1.numeros_ultimo, 'active');
                dibujar('box-c1', d1.capa1);

                // ESPERA 2 SEGUNDOS
                await new Promise(res => setTimeout(res, 2000));
                document.getElementById('box-c5').innerHTML = "<span class='loader-text'>Analizando Pares...</span>";

                // ETAPA 2: CAPA 5
                const r2 = await fetch('/api/capa5');
                const d2 = await r2.json();
                dibujar('box-c5', d2.capa5);

                // ESPERA 2 SEGUNDOS
                await new Promise(res => setTimeout(res, 2000));
                document.getElementById('box-c10').innerHTML = "<span class='loader-text'>Calculando Score...</span>";

                // ETAPA 3: CAPA 10
                const r3 = await fetch('/api/capa10');
                const d3 = await r3.json();
                dibujar('box-c10', d3.capa10, 'final');

            } catch (err) {
                console.error(err);
                document.body.innerHTML += `<p style="color:red; text-align:center;">ERROR: No se pudo conectar con la API. Revisa los archivos .py en /api</p>`;
            }
        }

        window.onload = ejecutarSistema;
    </script>
</body>
</html>
