<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MELATE MAESTRO | Inteligencia Estadística</title>
    <style>
        :root {
            --primary-bg: #f4f7f9;
            --card-bg: #ffffff;
            --accent: #d4af37; /* Dorado Melate */
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --border: #e1e8ed;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .full-width { grid-column: 1 / -1; }

        h2 { color: var(--accent); margin-top: 0; font-size: 1.1rem; text-transform: uppercase; }

        .ball-container { display: flex; gap: 8px; margin-top: 15px; flex-wrap: wrap; }
        .ball {
            width: 35px; height: 35px;
            background: #eee; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 0.9rem;
        }
        .ball.active { background: var(--accent); color: white; }

        .stats-list { list-style: none; padding: 0; }
        .stats-list li {
            display: flex; justify-content: space-between;
            padding: 8px 0; border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .status-tag {
            font-size: 0.7rem; background: #e8f5e9; color: #2e7d32;
            padding: 4px 8px; border-radius: 4px; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>MELATE MAESTRO</h1>
        <div class="status-tag">SISTEMA OPERATIVO // CAPA 1 ACTIVADA</div>
    </header>

    <div class="dashboard-grid">
        <div class="card full-width">
            <h2>📡 Último Registro en HIST (Concurso <span id="id-concurso">...</span>)</h2>
            <div id="numeros-ultimo" class="ball-container"></div>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 10px;">
                Fecha: <span id="fecha-ultimo">...</span> | Día: <span id="dia-ultimo">...</span>
            </p>
        </div>

        <div class="card">
            <h2>📊 Capa 1: Números de Alta Frecuencia</h2>
            <div id="frecuencia-general" class="ball-container"></div>
            <p style="font-size: 0.8rem; margin-top: 10px;">Top 7 números con más apariciones históricas.</p>
        </div>

        <div class="card">
            <h2>📅 Tendencia por Día (<span id="nombre-dia">...</span>)</h2>
            <div id="frecuencia-dia" class="ball-container"></div>
            <p style="font-size: 0.8rem; margin-top: 10px;">Números que más salen en este día específico.</p>
        </div>
    </div>
</div>

<script>
    window.onload = async () => {
        try {
            const response = await fetch('/api/index');
            const data = await response.json();

            // Llenar datos último sorteo
            document.getElementById('id-concurso').innerText = data.ultimo.concurso;
            document.getElementById('fecha-ultimo').innerText = data.ultimo.fecha;
            document.getElementById('dia-ultimo').innerText = data.ultimo.dia;
            renderBalls('numeros-ultimo', data.ultimo.numeros, true);

            // Llenar Frecuencias Generales
            renderBalls('frecuencia-general', data.capa1.general);

            // Llenar Frecuencias por Día
            document.getElementById('nombre-dia').innerText = data.ultimo.dia;
            renderBalls('frecuencia-dia', data.capa1.por_dia);

        } catch (e) {
            console.error("Error cargando Melate Maestro:", e);
        }
    };

    function renderBalls(id, nums, active=false) {
        const container = document.getElementById(id);
        container.innerHTML = nums.map(n => `<div class="ball ${active ? 'active' : ''}">${n}</div>`).join('');
    }
</script>

</body>
</html>
